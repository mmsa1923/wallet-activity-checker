name: Check Wallet Activity

on:
 on:
  schedule:
    - cron: "0 * * * *"  # Rulează automat la fiecare oră fixă (la minutul 0 al fiecărei ore)
  workflow_dispatch: {}    # Îți permite să apeși manual pe butonul de start

permissions:
  contents: write

jobs:
  check-activity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run activity check
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
          DUNE_QUERY_ID: ${{ secrets.DUNE_QUERY_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACTIVE_THRESHOLD_HOURS: "24"
        run: python check_wallet_activity.py

      - name: Commit updated state
        run: |
          git config user.name "wallet-activity-bot"
          git config user.email "actions@github.com"
          git add activity_state.json
          git diff --staged --quiet || git commit -m "Update active wallets state"
          git push || echo "No changes to push"
